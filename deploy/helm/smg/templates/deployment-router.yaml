apiVersion: apps/v1
{{- if .Values.router.mesh.enabled }}
kind: StatefulSet
{{- else }}
kind: Deployment
{{- end }}
metadata:
  name: {{ include "smg.fullname" . }}-router
  labels:
    {{- include "smg.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  {{- if not .Values.router.autoscaling.enabled }}
  replicas: {{ .Values.router.replicas }}
  {{- end }}
  {{- if .Values.router.mesh.enabled }}
  serviceName: {{ include "smg.fullname" . }}-router-headless
  podManagementPolicy: Parallel
  {{- end }}
  selector:
    matchLabels:
      {{- include "smg.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: router
  template:
    metadata:
      annotations:
        {{- if .Values.router.mesh.enabled }}
        sglang.ai/mesh-port: {{ .Values.router.mesh.port | quote }}
        {{- end }}
        {{- with .Values.router.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "smg.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: router
        {{- with .Values.router.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "smg.serviceAccountName" . }}
      containers:
        - name: router
          image: "{{ include "smg.routerImage" . }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args:
            {{- include "smg.routerArgs" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.router.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.router.metrics.port }}
              protocol: TCP
            {{- if .Values.router.mesh.enabled }}
            - name: mesh
              containerPort: {{ .Values.router.mesh.port }}
              protocol: TCP
            {{- end }}
          {{- with .Values.router.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.router.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.router.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.router.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.router.readinessProbe.periodSeconds }}
          {{- with .Values.router.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            {{- if .Values.router.mesh.enabled }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            {{- end }}
            {{- if .Values.huggingface.token }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "smg.fullname" . }}-hf-token
                  key: token
            {{- end }}
            {{- with .Values.router.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.router.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.router.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
