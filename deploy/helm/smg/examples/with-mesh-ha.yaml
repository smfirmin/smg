# SMG gateway with Mesh HA (2 replicas) + vLLM worker
# Usage: helm install smg deploy/helm/smg -f deploy/helm/smg/examples/with-mesh-ha.yaml
#
# Deploys a 2-replica gateway with mesh synchronization enabled.
# Both gateway replicas share cache-aware routing state via the
# mesh gossip protocol, ensuring consistent routing decisions.
#
# Prerequisites:
#   - GPU nodes with nvidia.com/gpu resource
#   - HuggingFace token for gated models (set huggingface.token)

global:
  image:
    registry: docker.io
    repository: lightseekorg/smg
    tag: "1.3.3"

huggingface:
  token: ""  # set via --set huggingface.token=hf_xxx

router:
  replicas: 2
  policy: cache_aware
  model: meta-llama/Llama-3.1-8B-Instruct
  mesh:
    enabled: true
  healthCheck:
    enabled: false  # disable until workers are ready
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      memory: 8Gi

workers:
  - name: llama-8b
    engine: vllm
    model: meta-llama/Llama-3.1-8B-Instruct
    replicas: 2
    connectionMode: http
    gpu:
      count: 1
    image:
      tag: "1.3.3-vllm-v0.18.0"
    resources:
      requests:
        cpu: "4"
        memory: 32Gi
      limits:
        memory: 64Gi
    startupProbe:
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 30
