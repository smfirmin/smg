name: Benchmark - Mesh Serialization

on:
  push:
    branches: [main]
    paths:
      - 'crates/mesh/**'
      - '!crates/mesh/**/tests/**'
      - '!crates/mesh/**/*_test.rs'
  pull_request:
    branches: [main]
    paths:
      - 'crates/mesh/**'
      - '!crates/mesh/**/tests/**'
      - '!crates/mesh/**/*_test.rs'
  workflow_dispatch:

concurrency:
  group: benchmark-mesh-serialization-${{ github.ref }}
  cancel-in-progress: true

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

permissions:
  contents: read

jobs:
  benchmark:
    name: Mesh Serialization
    if: github.repository == 'lightseekorg/smg'
    runs-on: k8s-runner-cpu
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          sccache-version: 'v0.10.0'

      - name: Run benchmark
        timeout-minutes: 15
        run: |
          set -o pipefail
          source "$HOME/.cargo/env"
          cargo bench --bench mesh_serialization -p smg-mesh 2>&1 | tee benchmark_output.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mesh-serialization-results-${{ github.sha }}
          path: |
            target/criterion/
            benchmark_output.txt
          retention-days: 30

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Summary
        if: always()
        run: |
          echo "## Mesh Serialization Benchmark" >> "$GITHUB_STEP_SUMMARY"
          if [ -f benchmark_output.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -E 'time:|KB|serialize|deserialize' benchmark_output.txt | tail -40 >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
