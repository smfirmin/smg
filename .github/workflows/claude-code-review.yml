name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '*.lock'
      - 'mkdocs.yml'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # Auto-review on PR open/push
  review:
    name: Claude PR Review
    if: >-
      github.event_name == 'pull_request'
      && github.repository == 'lightseekorg/smg'
      && github.actor != 'dependabot[bot]'
      && !github.event.pull_request.head.repo.fork
    runs-on: k8s-runner-cpu
    timeout-minutes: 30
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Export API key from pod env
        run: |
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$GITHUB_ENV"

      - name: Install gh CLI
        run: |
          if ! command -v gh &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            GH_VERSION="2.74.0"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
              | tar xz --strip-components=2 -C "$HOME/.local/bin" "gh_${GH_VERSION}_linux_amd64/bin/gh"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. Read REVIEW.md first for severity format,
            focus areas, and domain knowledge.

            For every issue found, call mcp__github_inline_comment__create_inline_comment
            with path, line, and a severity-prefixed body per REVIEW.md format.

            IMPORTANT — Deduplication:
            Before posting any comment, first fetch all existing review comments
            on this PR by running:
              gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --paginate

            Self-dedup (strict): If claude[bot] already commented on the same
            file and line (±3 lines), SKIP — do not post regardless of wording.

            Cross-bot awareness (soft): If another bot (coderabbitai[bot],
            gemini-code-assist[bot], chatgpt-codex-connector[bot]) already
            commented on the same file and line (±3 lines), READ their comment.
            Only post if you have a genuinely different concern not covered by
            the existing comment. Do not rephrase the same issue.

            Steps:
            1. Read REVIEW.md for review guidelines.
            2. Fetch existing review comments on this PR (for dedup).
            3. Run `git diff origin/main...HEAD` to see what changed.
            4. Read each changed file for full context.
            5. Post inline comments only for NEW issues not already flagged.
            6. Write a brief summary with count per severity level.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Read,Glob,Grep,Bash,Agent,Skill,ToolSearch,TaskCreate,TaskUpdate,TaskGet,mcp__github_inline_comment__create_inline_comment"
          show_full_output: true
          plugins: "pr-review-toolkit@claude-plugins-official"
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/lightseekorg/smg-dev-guide.git

  # Respond to @claude mentions in PR/issue comments
  respond:
    name: Claude Respond
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && contains(github.event.comment.body, '@claude')
      && github.repository == 'lightseekorg/smg'
    runs-on: k8s-runner-cpu
    timeout-minutes: 30
    concurrency:
      group: claude-respond-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Export API key from pod env
        run: |
          echo "::add-mask::${ANTHROPIC_API_KEY}"
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" >> "$GITHUB_ENV"

      - name: Install gh CLI
        run: |
          if ! command -v gh &>/dev/null; then
            mkdir -p "$HOME/.local/bin"
            GH_VERSION="2.74.0"
            curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
              | tar xz --strip-components=2 -C "$HOME/.local/bin" "gh_${GH_VERSION}_linux_amd64/bin/gh"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-opus-4-6
            --max-turns 30
            --allowedTools "Read,Glob,Grep,Bash,Agent,Skill,ToolSearch,TaskCreate,TaskUpdate,TaskGet,mcp__github_inline_comment__create_inline_comment"
          plugins: "pr-review-toolkit@claude-plugins-official"
          plugin_marketplaces: |
            https://github.com/anthropics/claude-plugins-official.git
            https://github.com/lightseekorg/smg-dev-guide.git
