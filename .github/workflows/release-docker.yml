name: Release Docker Image

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile
      - bindings/python/pyproject.toml
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v1.0.1). Leave empty to use version from pyproject.toml'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # Always runs: validates the Dockerfile builds successfully.
  # Pushes only when triggered by a version bump (pyproject.toml) or manual dispatch.
  build-and-push:
    name: Build and push Docker image
    if: github.repository == 'lightseekorg/smg'
    runs-on: ["8-gpu-h200"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ -n "${INPUT_TAG}" ]]; then
            VERSION="${INPUT_TAG}"
          else
            VERSION=$(grep -m1 '^version = ' bindings/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

      - name: Check if this is a release (should push)
        id: should-push
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_AFTER: ${{ github.sha }}
        run: |
          PUSH="false"
          # Manual dispatch always pushes
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PUSH="true"
          fi
          # Push event: only push if pyproject.toml changed (version bump)
          # Uses the full push range (before..after) to catch changes across
          # multiple commits, not just HEAD~1.
          if [[ "${EVENT_NAME}" == "push" ]]; then
            if git diff --name-only "${EVENT_BEFORE}" "${EVENT_AFTER}" | grep -q '^bindings/python/pyproject.toml$'; then
              PUSH="true"
            fi
          fi
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${PUSH}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.should-push.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ steps.should-push.outputs.push }}
          tags: |
            lightseekorg/smg:${{ steps.version.outputs.version }}
            lightseekorg/smg:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
